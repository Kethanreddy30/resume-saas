<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ full_name }} — Resume</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
      line-height: 1.4;
      color: #111;
      margin: 36px;
    }
    h1 {
      font-size: 22pt;
      margin: 0 0 4px 0;
    }
    .contact {
      font-size: 10pt;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 12pt;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      margin: 18px 0 8px 0;
      padding-bottom: 2px;
    }
    p { margin: 0 0 8px 0; }
  </style>
</head>
<body>
  <h1>{{ full_name }}</h1>
  <div class="contact">{{ email }}</div>

  <h2>Summary</h2>
  <p>{{ summary }}</p>

  <h2>Skills</h2>
  <p>{{ skills }}</p>

  <h2>Experience</h2>
  {{ experience }}

  <h2>Education</h2>
  {{ education }}
</body>
</html>
